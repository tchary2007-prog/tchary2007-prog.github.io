<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veerbhadra Enterprises</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f8f5f0;
}

header {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 15px;
  background: white;
}

header a {
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
}

.btn {
  padding: 12px 20px;
  border-radius: 6px;
  margin: 5px;
  text-decoration: none;
}

.whatsapp {
  background: #c58a3c;
  color: white;
}

.call {
  background: #333;
  color: white;
}

.products {
  text-align: center;
  padding: 40px;
}

.product-grid {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 250px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>
  <a href="#">Home</a>
  <a href="#">Products</a>
  <a href="#">Contact</a>
</header>

<section class="hero">
  <h1>Fresh Quality You Can Taste</h1>
  <p>Dry fruits, spices, and seeds available at our store.</p>
  <a href="#" class="btn whatsapp">Order on WhatsApp</a>
  <a href="#" class="btn call">Call Us</a>
</section>

<section class="products">
  <h2>Our Products</h2>

  <div class="product-grid">

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Almonds.jpg">
      <h3>Almonds & Nuts</h3>
    </div>

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Spices.jpg">
      <h3>Pure Spices</h3>
    </div>

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/02/Seeds.jpg">
      <h3>Seeds & More</h3>
    </div>

  </div>
</section>

</body>
</html>
